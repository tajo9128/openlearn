<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="1200" height="240">
  <defs>
    <style>
      .logo-icon { fill: #10b981; }
      .bio-text { fill: #0f172a; font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 800; font-size: 42px; letter-spacing: -0.5px; }
      .dockify-text { fill: #10b981; font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 800; font-size: 42px; letter-spacing: -0.5px; }
      .learn-text { fill: #64748b; font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 500; font-size: 24px; letter-spacing: 1px; }
      @media (prefers-color-scheme: dark) {
        .bio-text { fill: #f8fafc; }
        .learn-text { fill: #94a3b8; }
      }
    </style>
  </defs>
  <!-- BioDockify Logo Icon (molecule/beaker hybrid) -->
  <g transform="translate(10, 20)">
    <!-- Hexagon ring (benzene-like) -->
    <path class="logo-icon" d="M30 0 L55 14 L55 42 L30 56 L5 42 L5 14 Z" fill="none" stroke="#10b981" stroke-width="3.5" stroke-linejoin="round"/>
    <!-- Inner bonds -->
    <line x1="30" y1="14" x2="30" y2="42" stroke="#10b981" stroke-width="2.5" opacity="0.4"/>
    <line x1="15" y1="22" x2="45" y2="36" stroke="#10b981" stroke-width="2" opacity="0.3"/>
    <line x1="45" y1="22" x2="15" y2="36" stroke="#10b981" stroke-width="2" opacity="0.3"/>
    <!-- Center dot -->
    <circle cx="30" cy="28" r="5" fill="#10b981"/>
  </g>
  <!-- "BioDockify" text -->
  <text x="80" y="50" class="bio-text">Bio<tspan class="dockify-text">Dockify</tspan></text>
  <!-- "LEARN" tagline -->
  <text x="82" y="80" class="learn-text">LEARN</text>
</svg>

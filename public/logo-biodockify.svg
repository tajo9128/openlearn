<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 160" width="1000" height="320">
  <defs>
    <style>
      .bio-text { fill: #0f172a; font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 48px; }
      .dockify-text { fill: #00a1ff; font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 48px; }
      .tagline-text { fill: #64748b; font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 500; font-size: 14px; letter-spacing: 0.5px; }
    </style>
  </defs>

  <g transform="translate(20, 60)">
    <g transform="translate(10, -35) scale(1.3)">
      <path d="M10,0 Q25,25 40,0 T70,0" fill="none" stroke="#00a1ff" stroke-width="6" stroke-linecap="round" />
      <path d="M10,50 Q25,25 40,50 T70,50" fill="none" stroke="#7c3aed" stroke-width="6" stroke-linecap="round" />
      <line x1="25" y1="12" x2="25" y2="38" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round" />
      <line x1="55" y1="12" x2="55" y2="38" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round" />
      <circle cx="10" cy="0" r="4" fill="#00a1ff" />
      <circle cx="40" cy="0" r="4" fill="#00a1ff" />
      <circle cx="70" cy="0" r="4" fill="#00a1ff" />
      <circle cx="10" cy="50" r="4" fill="#7c3aed" />
      <circle cx="40" cy="50" r="4" fill="#7c3aed" />
      <circle cx="70" cy="50" r="4" fill="#7c3aed" />
    </g>

    <g transform="translate(110, 0)">
        <text x="0" y="10" class="bio-text">Bio<tspan class="dockify-text">Dockify</tspan></text>
        <text x="2" y="40" class="tagline-text">
            <tspan x="2" dy="0">Empowering Drug Discovery with</tspan>
            <tspan x="2" dy="1.4em">Cloud-Native Docking.</tspan>
        </text>
    </g>
  </g>
</svg>